name: CI

on:
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck
        run: >-
          shellcheck -S style -e SC2317,SC2034
          install.sh uninstall.sh preflight.sh
          operator/state-viewer/generate-token.sh
          operator/state-viewer/start.sh
          operator/templates/*.sh
          tools/hooks/*.sh

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install ruff
        run: uv tool install ruff
      - name: Ruff check
        run: ruff check tools/*/server.py tools/*/validate.py tools/*/schema.py tools/skill-router/indexer.py tools/skill-router/convert_frontmatter.py tools/skill-router/update_routing_refs.py operator/state-viewer/server.py
      - name: Ruff format
        run: ruff format --check tools/*/server.py tools/*/validate.py tools/*/schema.py tools/skill-router/indexer.py tools/skill-router/convert_frontmatter.py tools/skill-router/update_routing_refs.py operator/state-viewer/server.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install lint dependencies
        run: cd tools/skill-router && uv sync --only-group lint
      - name: Run skill and agent lint
        run: cd tools/skill-router && uv run --only-group lint pytest tests/test_skills.py tests/test_agents.py tests/test_index.py -v

  test-tools:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: [nmap-server, shell-server, browser-server, state-server, rdp-server]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: cd tools/${{ matrix.tool }} && uv sync --group dev
      - name: Run tests
        run: cd tools/${{ matrix.tool }} && uv run pytest tests/ -v
