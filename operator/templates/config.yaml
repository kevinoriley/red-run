# red-run engagement configuration
# Generated by config wizard. Edit at any time.

# Network scan type: quick | full
# Omit to be prompted each time.
scan_type: quick

# Web proxy for attackbox HTTP(S) traffic (Burp capture).
# Only takes effect when HTTP/HTTPS services are discovered.
# Omit entire section to be prompted when HTTP is found.
web_proxy:
  enabled: true
  url: "http://127.0.0.1:8080"

# Default password spray tier: light | medium | heavy | skip
# Hard stop still fires to show context; this pre-selects the default.
# Omit to be prompted with no default.
spray:
  default_tier: light

# Default hash cracking method: local | external | skip
# Hard stop still fires to show hash details; this pre-selects the default.
# Omit to be prompted with no default.
cracking:
  default_method: local

# Callback interface for reverse shells.
# Omit to auto-detect tun0/wg0 at runtime.
# callback_ip: "10.10.14.5"
# callback_interface: "tun0"
